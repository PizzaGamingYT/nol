body { margin:0; font-family:"Commissioner",sans-serif; background:#111; color:#fff; overflow:hidden; }

#tickerText { position:absolute; white-space:nowrap; font-family:"Shrikhand"; }


#topbar { position:fixed; top:0; left:0; width:100%; background:#ff4d00; padding:10px; display:flex; align-items:center; gap:10px; z-index:9998; }
#logo { height:36px; }
.tab { background:#ff4d00; border:0; color:#fff; padding:10px 16px; border-radius:16px; cursor:pointer; font-family:"Shrikhand"; }
.tab:hover { background:#222; }


#sidebar { display:none; position:fixed; top:84px; left:0; width:60px; height:calc(100% - 84px); overflow:auto; background:#111; }
#main { margin-left:0; margin-top:84px; height:calc(100vh - 84px); overflow:auto; padding:10px; }
.withSidebar #sidebar { display:block; }
.withSidebar #main { margin-left:70px; }

#search{width:100%;  position: fixed; top: 84px; left: 0; width: 100%; z-index: 10000; padding:12px; border-radius:14px; border:2px solid #222; background:#222; color:#fff; font-family:"Shrikhand";}
#search:focus{outline:none; border-color:#ff4d00;}

.sidebar-btn { display:block; width:100%; padding:8px; background:#222; color:#fff; border:none; font-family:"Shrikhand"; }
.sidebar-btn:hover { background:#ff4d00; }

.section { margin-bottom:20px; }
.section h2 { margin:10px 0; }

.game-btn { width:100%; max-width:100%; box-sizing:border-box; padding:14px; margin:6px 0; background:#222; color:#fff; border:2px solid #222; border-radius:14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
.game-btn:hover { background:#ff4d00; }

.fav { border-color:#FF4D00; }
.star { cursor:pointer; position:relative; }
.star.off::after { content:"★"; color:#888; }
.star.on::after { content:"★"; color:gold; }
.star.on::before { content:"/"; color:red; position:absolute; left:0; top:0; }

.handle { cursor:grab; margin-right:8px; }

.danger { background:red; color:#fff; border:none; padding:12px; border-radius:12px; cursor:pointer; }
.standard { background:#222222; color:#fff; border:2px solid #ff4d00; padding:12px; border-radius:12px; cursor:pointer; }
.standard:hover { background:#ff4d00; }


#tocModal { position:fixed; top:0; left:0; width:100%; height:100%; background:#000b; display:none; z-index:10000; }
.modal { background:#111; margin:5% auto; padding:20px; width:60%; max-height:80%; overflow:auto; border-radius:16px; }
.modal button { background:#ff4d00; border:none; padding:10px 20px; border-radius:20px; margin:10px; cursor:pointer; }


#presetModal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000b;display:none;z-index:11000;}
.presetBox{background:#111;margin:5% auto;padding:20px;width:400px;border-radius:16px;}
.presetBox input{width:100%;margin:6px 0;padding:10px;border-radius:10px;border:2px solid #222;background:#222;color:#fff;}
.presetBox button { background:#ff4d00; border:none; padding:10px 20px; border-radius:20px; margin:10px; cursor:pointer; }

const tickerText=document.getElementById('tickerText');
function cycleTicker(){
 tickerText.textContent=messages[msgIndex];
 tickerText.style.left='100%';
 let pos=window.innerWidth;
 const interval=setInterval(()=>{
  pos--;
  tickerText.style.left=pos+'px';
  if(pos<-tickerText.offsetWidth){
    clearInterval(interval);
    msgIndex=(msgIndex+1)%messages.length;
    setTimeout(cycleTicker,500);
  }
 },10);
}

let favorites = JSON.parse(localStorage.getItem('favorites')||'[]');


function build(filter=''){
 document.body.classList.add('withSidebar');
 const main=document.getElementById('main');
 const sidebar=document.getElementById('sidebar');
 const searchWrap = document.getElementById('searchWrap');
main.innerHTML = '';
if (searchWrap) main.appendChild(searchWrap); sidebar.innerHTML='';

 

 if(favorites.length){
  const sec=document.createElement('div');
  sec.className='section'; sec.innerHTML='<h2>Favorites</h2>';
  favorites.filter(f=>f.includes(filter)).forEach(f=>sec.appendChild(createGameBtn(f)));
  if(sec.children.length>1) main.appendChild(sec);
 }

 const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789'.split('');
 letters.forEach(l=>{
  const sec=document.createElement('div'); sec.className='section'; sec.id='sec'+l;
  const title=document.createElement('h2'); title.textContent=l; sec.appendChild(title);

  let has=false;
  files.forEach(f=>{
   if(f[2]?.toUpperCase()===l && f.toLowerCase().includes(filter)){
    has=true;
    sec.appendChild(createGameBtn(f));
   }
  });

  if(has){
   main.appendChild(sec);
   const b=document.createElement('button');
   b.className='sidebar-btn'; b.textContent=l;
   b.onclick=()=>document.getElementById('sec'+l).scrollIntoView({behavior:'smooth'});
   sidebar.appendChild(b);
  }
 });
 const search = document.getElementById('search');
if (search) {
  search.focus();
  search.setSelectionRange(search.value.length, search.value.length);
}
}


function createGameBtn(f){
 const btn=document.createElement('div');
 btn.className='game-btn'+(favorites.includes(f)?' fav':'');

 const handle=document.createElement('span'); handle.className='handle'; handle.textContent='≡';
 const text=document.createElement('span'); text.textContent=f;

 const star=document.createElement('span');
 star.className='star '+(favorites.includes(f)?'on':'off');
 star.onclick=(e)=>{
  e.stopPropagation();
  if(favorites.includes(f)) favorites=favorites.filter(x=>x!==f);
  else favorites.push(f);
  localStorage.setItem('favorites',JSON.stringify(favorites));
  build();
 };

 btn.onclick=()=>{
  const encoded=encodeURIComponent(f+'.html');
  fetch(`https://raw.githubusercontent.com/PizzaGamingYT/nolsgames/refs/heads/main/UGS-Files/${encoded}?t=${Date.now()}`)
  .then(r=>r.text())
  .then(t=>{const w=window.open('about:blank','_blank'); if(w){w.document.open();w.document.write(t);w.document.close();}});
 };

 btn.append(handle,text,star);
 return btn;
}




function openPreset(){
 const p = JSON.parse(localStorage.getItem('preset') || '{}');

 tabName.value = p.name || '';
 tabIcon.value = p.icon || '';
 panicKey.value = p.key || '';
 panicLink.value = p.link || '';

 presetModal.style.display = 'block';
}

function savePreset(){
 const rawLink = panicLink.value.trim();

 const fixedLink = rawLink
  ? (rawLink.startsWith('http://') || rawLink.startsWith('https://')
      ? rawLink
      : 'https://' + rawLink)
  : '';

 const data = {
  name: tabName.value,
  icon: tabIcon.value,
  key: panicKey.value,
  link: fixedLink
 };

 localStorage.setItem('preset', JSON.stringify(data));
 applyPreset();
 presetModal.style.display = 'none';
}

function applyPreset(){
 const p=JSON.parse(localStorage.getItem('preset')||'{}');
 if(p.name) document.title=p.name;
 if(p.icon) document.getElementById('dynamicFavicon').href=p.icon;
 document.onkeydown=(e)=>{
  if(p.key && e.key.toLowerCase()===p.key.toLowerCase()){
    window.location.href=p.link||'https://google.com';
  }
 };
}
applyPreset();


function showTab(tab){
 const main=document.getElementById('main');
 const sidebar=document.getElementById('sidebar');

 if(tab==='games'){ document.body.classList.add('withSidebar'); build(); return; }
 document.body.classList.remove('withSidebar'); sidebar.innerHTML='';

 if(tab==='settings'){
  main.innerHTML=`
  <h2>Settings</h2>
  <button class="standard" onclick="openPreset()">🧠 Tab Presets</button><br><br>
  <button class="standard" onclick="openToc()">📜 Terms</button><br><br><br><br>
  <button class="danger" onclick="clearData()">🗑️ Clear Game Data</button><br><br>
  `;
 }
 if(tab==='info') main.innerHTML=`<h2>Info</h2><p>Nol'sGames info tab.</p>`;
}

function clearData(){
 if(confirm('Delete ALL data?')){ localStorage.clear(); location.reload(); }
}

build();

document.addEventListener("DOMContentLoaded", () => {
 const search = document.getElementById("search");

 search.addEventListener("input", (e) => {
  build(e.target.value.toLowerCase());
 });
});
