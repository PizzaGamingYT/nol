                tickerText.style.left = pos + 'px';

        let tocIndex = 0;

        function openToc() {
            document.getElementById('tocModal').style.display = 'block';
            tocIndex = 0;
            tocContent.innerHTML = tocPages[0];
        }

        function acceptToc() {
            localStorage.setItem('toc', '1');
            tocModal.style.display = 'none';
        }
        if (!localStorage.getItem('toc')) setTimeout(openToc, 500);
        let files = [];
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        async function loadGameList() {
            try {
                const res = await fetch('https://cdn.jsdelivr.net/gh/PizzaGamingYT/nol/list.js?t=' + Date.now());
                const js = await res.text();
                eval(js);
                files = window.files || [];
                build();
            } catch (err) {
                console.error('Failed to load game list:', err);
                document.getElementById('main').innerHTML = `
      
																																				<h2>Failed to load games.</h2>
																																				<p>Please try again later.</p>
    `;
            }
        }

        function build(filter = '') {
            document.body.classList.add('withSidebar');
            const main = document.getElementById('main');
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '';
            if (favorites.length) {
                const favBtn = document.createElement('button');

                favBtn.className = 'sidebar-btn';
                favBtn.textContent = '★';

                favBtn.onclick = () => {
                    document
                        .getElementById('favoritesSection')
                        ?.scrollIntoView({
                            behavior: 'smooth'
                        });
                };

                sidebar.appendChild(favBtn);
            }
            main.innerHTML = `<div id="searchWrap"><input id="search" placeholder="Search games..." value="${filter}"></div>`;
            const search = document.getElementById("search");
            search.addEventListener("input", (e) => {
                build(e.target.value.toLowerCase());
            });
            if (favorites.length) {
                const sec = document.createElement('div');
                sec.className = 'section';
                sec.innerHTML = ' <h2>Favorites</h2>';
                favorites.filter(f => f.toLowerCase().includes(filter)).forEach(f => sec.appendChild(createGameBtn(f)));
                if (sec.children.length > 1) main.appendChild(sec);
            }
            const letters = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            letters.forEach(l => {
                const sec = document.createElement('div');
                sec.className = 'section';
                sec.id = 'favoritesSection';
                sec.id = 'sec' + l;
                const title = document.createElement('h2');
                title.textContent = l;
                sec.appendChild(title);
                let has = false;
                files.forEach(f => {
                    const firstLetter = f.toLowerCase().startsWith('cl') ? f[2] : f.toLowerCase().startsWith('ng') ? f[2] : f[0];
                    if (firstLetter?.toUpperCase() === l && f.toLowerCase().includes(filter)) {
                        has = true;
                        sec.appendChild(createGameBtn(f));
                    }
                });
                if (has) {
                    main.appendChild(sec);
                    const b = document.createElement('button');
                    b.className = 'sidebar-btn';
                    b.textContent = l;
                    b.onclick = () => {
                        document.getElementById('sec' + l).scrollIntoView({
                            behavior: 'smooth'
                        });
                    };
                    sidebar.appendChild(b);
                }
            });
            search.focus();
            search.setSelectionRange(search.value.length, search.value.length);
        }

        function createGameBtn(f) {
            const btn = document.createElement('div');
            btn.className = 'game-btn' + (favorites.includes(f) ? ' fav' : '');
            const text = document.createElement('span');
            text.textContent = f;
            const star = document.createElement('span');
            star.className = 'star ' + (favorites.includes(f) ? 'on' : 'off');
            star.onclick = (e) => {
                e.stopPropagation();
                if (favorites.includes(f)) favorites = favorites.filter(x => x !== f);
                else favorites.push(f);
                localStorage.setItem('favorites', JSON.stringify(favorites));
                build();
            };
            btn.onclick = () => {
                const encoded = encodeURIComponent(f + '.html');
                fetch(`https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile/UGS-Files/${encoded}?t=${Date.now()}`).then(r => r.text()).then(t => {
                    const w = window.open('about:blank', '_blank');
                    if (w) {
                        w.document.open();
                        w.document.write(t);
                        w.document.close();
                    }
                });
            };
            btn.append(text, star);
            return btn;
        }
        let uploadedFavicon = '';

        function openPreset() {
            const p = JSON.parse(localStorage.getItem('preset') || '{}');
            tabName.value = p.name || '';
            panicKey.value = p.key || '';
            panicLink.value = p.link || '';
            uploadedFavicon = p.icon || '';
            presetModal.style.display = 'block';
        }

        function handleFaviconUpload(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedFavicon = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function savePreset() {
            const rawLink = panicLink.value.trim();
            const fixedLink = rawLink ? (rawLink.startsWith('http://') || rawLink.startsWith('https://')) ? rawLink : 'https://' + rawLink : '';
            const data = {
                name: tabName.value,
                icon: uploadedFavicon,
                key: panicKey.value,
                link: fixedLink
            };
            localStorage.setItem('preset', JSON.stringify(data));
            applyPreset();
            presetModal.style.display = 'none';
            location.reload();
        }

        function applyPreset() {
            const p = JSON.parse(localStorage.getItem('preset') || '{}');
            const panicKeyValue = p.key || '\\';
            const panicLinkValue = p.link || 'https://google.com';
            document.title = p.name || "Nol'sGames";
            let favicon = document.getElementById('dynamicFavicon');
            if (!favicon) {
                favicon = document.createElement('link');
                favicon.rel = 'icon';
                favicon.id = 'dynamicFavicon';
                document.head.appendChild(favicon);
            }
            favicon.href = p.icon || 'https://nolsgames.xyz/favicon.ico?v=2';
            document.onkeydown = null;
            document.onkeydown = (e) => {
                if (e.key.toLowerCase() === panicKeyValue.toLowerCase()) {
                    window.location.href = panicLinkValue;
                }
            };
        }

        function resetPresets() {
            if (!confirm('Reset all preset settings?')) return;
            localStorage.removeItem('preset');
            const defaultPreset = {
                name: "Nol'sGames",
                icon: "",
                key: "\\",
                link: "https://google.com"
            };
            localStorage.setItem('preset', JSON.stringify(defaultPreset));
            uploadedFavicon = '';
            document.getElementById('faviconPreview').style.display = 'none';
            tabName.value = '';
            panicKey.value = '\\';
            panicLink.value = 'https://google.com';
            applyPreset();
            location.reload();
        }

        function closePresets() {
            document.getElementById('presetModal').style.display = 'none';
        }
        if (!localStorage.getItem('preset')) {
            localStorage.setItem('preset', JSON.stringify({
                name: "Nol'sGames",
                icon: "",
                key: "\\",
                link: "https://google.com"
            }));
        }
        applyPreset();

        function showTab(tab) {
            const main = document.getElementById('main');
            const sidebar = document.getElementById('sidebar');
            if (tab === 'games') {
                document.body.classList.add('withSidebar');
                build();
                return;
            }
            document.body.classList.remove('withSidebar');
            sidebar.innerHTML = '';
            if (tab === 'settings') {
                main.innerHTML = `
 
																																					<h2>Settings</h2>
																																					<button class="standard" onclick="openPreset()">Tab Settings</button>
																																					<br>
																																						<br>
																																							<button class="standard" onclick="openToc()">Terms And Conditions & Privacy Policy</button>
																																							<br>
																																								<br>
																																									<br>
																																										<br>
																																											<button class="standard" onclick="exportNGS()">Download Game Data (.ngs)</button>
																																											<br>
																																												<br>
																																													<button class="standard" onclick="document.getElementById('ngsUpload').click()">
 Upload Game Data (.ngs)
 </button>
																																													<input
   type="file"
   id="ngsUpload"
   accept=".ngs"
   style="display:none"
   onchange="importNGS(this.files[0])"
 >
																																														<br>
																																															<br>
																																																<br>
																																																	<label class="ngToggleWrap">
																																																		<span>Auto Refresh Daily</span>
																																																		<div class="ngSwitch">
																																																			<input type="checkbox" id="autoRefreshToggle" onchange="toggleAutoRefresh(this.checked)" >
																																																				<span class="ngSlider"></span>
																																																			</div>
																																																		</label>
																																																		<br>
																																																			<br>
																																																				<br>
																																																					<button class="danger" onclick="clearData()">Clear Game Data</button>
																																																					<br>
																																																						<br>
 `;
            }
            setTimeout(() => {
                const settings = JSON.parse(localStorage.getItem('ngSettings') || '{}');
                const toggle = document.getElementById('autoRefreshToggle');
                if (toggle) {
                    toggle.checked = settings.autoRefresh !== false;
                }
            }, 0);
        }

        function toggleAutoRefresh(enabled) {
            const settings = JSON.parse(localStorage.getItem('ngSettings') || '{}');
            settings.autoRefresh = enabled;
            localStorage.setItem('ngSettings', JSON.stringify(settings));
        }

        function clearData() {
            if (confirm('Delete ALL data?')) {
                localStorage.clear();
                location.reload();
            }
        }

        function exportNGS() {
            const saveData = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                try {
                    saveData[key] = localStorage.getItem(key);
                } catch (err) {
                    console.log('Failed to save key:', key);
                }
            }
            const finalData = {
                created: new Date().toISOString(),
                storage: saveData
            };
            const blob = new Blob(
                [JSON.stringify(finalData, null, 2)], {
                    type: 'application/json'
                });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            const date = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + '_' + String(now.getHours()).padStart(2, '0') + '-' + String(now.getMinutes()).padStart(2, '0');
            a.download = `gd_${date}.ngs`;
            a.click();
            URL.revokeObjectURL(url);
            alert('Game data exported.');
        }

        function importNGS(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.storage) {
                        alert('Invalid .ngs save.');
                        return;
                    }
                    if (!confirm('Overwrite ALL current game data?')) return;
                    localStorage.clear();
                    for (const key in data.storage) {
                        try {
                            localStorage.setItem(key, data.storage[key]);
                        } catch (err) {
                            console.log('Failed restoring:', key);
                        }
                    }
                    alert('Game data restored.');
                    location.reload();
                } catch (err) {
                    console.error(err);
                    alert('Invalid .ngs file.');
                }
            };
            reader.readAsText(file);
        }

        function checkDailyRefresh() {
            const settings = JSON.parse(localStorage.getItem('ngSettings') || '{}');
            const autoRefresh = settings.autoRefresh !== false;
            if (!autoRefresh) return;
            const today = new Date().toDateString();
            const lastRefresh = localStorage.getItem('lastDailyRefresh');
            if (lastRefresh !== today) {
                localStorage.setItem('lastDailyRefresh', today);
                location.reload();
            }
        }
        if (!localStorage.getItem('ngSettings')) {
            localStorage.setItem('ngSettings', JSON.stringify({
                autoRefresh: true
            }));
        }
        checkDailyRefresh();
        loadGameList();
    </script>
</body>

</html>
